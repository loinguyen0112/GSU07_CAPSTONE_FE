# yaml-language-server: $schema=https://sap.github.io/ui5-tooling/schema/ui5.yaml.json

specVersion: "4.0"
metadata:
  name: hrrequest.hrm
type: application
builder:
  customTasks:
    - name: ui5-tooling-transpile-task
      afterTask: replaceVersion
      configuration:
        debug: true
        transformModulesToUI5:
          overridesToOverride: true
    - name: deploy-to-abap
      afterTask: generateCachebusterInfo
      configuration:
        target:
          url: https://s40.gb.ucc.cit.tum.de:443
          client: '324'
        app:
          name: ZZHRMG07
          description: Deploy 1st version
          package: ZSU26_GSU07_CAPSTONE
          transport: S40K919205
        exclude:
          - /test/
  resources:
    excludes:
      - /test/**
      - /localService/**
